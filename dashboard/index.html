<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live Session Dashboard</title>
<style>
  :root{
    --bg:#0a0d13; --panel:#10151f; --panel2:#151b28; --panel3:#1b2333; --line:#212c40;
    --ink:#e7ecf6; --dim:#8a97b1; --dim2:#5d6b8a; --accent:#5cc8ff; --accent2:#7c8cff;
    --good:#52e0a4; --warn:#ffcf5c; --bad:#ff6b81; --add:#2ea043; --del:#f85149;
    --opus:#c08cff; --sonnet:#5cc8ff; --haiku:#52e0a4;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:13.5px/1.55 ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .mono{font-family:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace}
  /* layout */
  .app{display:grid;grid-template-rows:auto 1fr;height:100%}
  header{display:flex;align-items:center;gap:14px;padding:10px 16px;
    background:linear-gradient(180deg,#0d121c,#0a0d13);border-bottom:1px solid var(--line)}
  header .logo{font-size:15px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
  header .proj{color:var(--dim);font-size:12px;max-width:30vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:10.5px;padding:2px 8px;border-radius:20px;background:var(--panel3);border:1px solid var(--line);color:var(--dim)}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px}
  .search input{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:7px 10px;width:260px;font-size:12.5px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .live{display:flex;align-items:center;gap:7px;color:var(--dim);font-size:12px;white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--good);animation:pulse 2s infinite}
  .dot.bad{background:var(--bad);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(82,224,164,.5)}70%{box-shadow:0 0 0 7px rgba(82,224,164,0)}100%{box-shadow:0 0 0 0 rgba(82,224,164,0)}}
  .main{display:grid;grid-template-columns:300px 1fr;min-height:0}
  /* sidebar */
  .side{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:var(--panel)}
  .side .sec{padding:10px 12px;border-bottom:1px solid var(--line)}
  .side .sec h3{margin:0 0 8px;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--dim)}
  .tree{flex:1;overflow:auto;padding:6px 4px}
  .node{display:flex;align-items:center;gap:6px;padding:3px 8px;border-radius:6px;cursor:pointer;white-space:nowrap;font-size:12.5px}
  .node:hover{background:var(--panel2)}
  .node.active{background:var(--panel3);color:#fff}
  .node .ic{width:14px;text-align:center;opacity:.85}
  .node .nm{overflow:hidden;text-overflow:ellipsis}
  .node .chg{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-left:auto;flex:none}
  .node.dir>.nm{color:var(--ink);font-weight:600}
  .kids{margin-left:12px;border-left:1px solid var(--line)}
  .feed{max-height:34vh;overflow:auto}
  .ev{padding:6px 12px;border-bottom:1px dashed var(--line);cursor:pointer;font-size:12px}
  .ev:hover{background:var(--panel2)}
  .ev .row1{display:flex;gap:8px;align-items:baseline}
  .ev .t{color:var(--dim);white-space:nowrap;font-size:11px}
  .ev .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis}
  .ev .d{margin-left:auto;font-size:11px;white-space:nowrap}
  .ev .add{color:var(--add)} .ev .del{color:var(--del)}
  /* content */
  .content{overflow:auto;min-height:0;padding:18px 22px}
  .crumbs{color:var(--dim);font-size:12px;margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .crumbs .btn{cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .stat .k{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:24px;font-weight:700;margin-top:3px}
  .stat .v small{font-size:13px;color:var(--dim);font-weight:400}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px}
  .card>h2{margin:0;padding:10px 15px;font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);
    background:var(--panel2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .card>h2 .count{margin-left:auto;color:var(--dim);font-weight:400}
  .card .body{padding:13px 15px}
  .flash{animation:flash 1.6s ease-out}
  @keyframes flash{0%{background:rgba(92,200,255,.20)}100%{background:transparent}}
  .bars{display:flex;flex-direction:column;gap:5px}
  .bar{display:grid;grid-template-columns:64px 1fr 36px;align-items:center;gap:8px;font-size:12px}
  .bar .track{height:8px;background:var(--panel3);border-radius:6px;overflow:hidden}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .pulse{display:flex;gap:2px;align-items:flex-end;height:38px}
  .pulse .b{flex:1;background:var(--panel3);border-radius:2px;min-height:2px}
  .pulse .b.hot{background:linear-gradient(180deg,var(--accent),var(--accent2))}
  .list .li{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:12.5px;cursor:pointer}
  .list .li:hover{color:#fff}
  .list .li .meta{margin-left:auto;color:var(--dim);font-size:11px;white-space:nowrap}
  .pill{font-size:10.5px;padding:1px 7px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
  .pill.todo{color:var(--warn);border-color:#5a4a1e}
  .pill.fixme{color:var(--bad);border-color:#5a2330}
  .pill.ph-plan{color:var(--warn)} .pill.ph-build{color:var(--accent)} .pill.ph-research{color:var(--accent2)}
  .pill.ph-qa{color:var(--good)} .pill.ph-review{color:var(--opus)} .pill.ph-ship{color:var(--good);border-color:#1e5a3a}
  .pill.ph-error{color:var(--bad);border-color:#5a2330} .pill.ph-heartbeat{color:var(--dim)}
  .empty{color:var(--dim);font-style:italic;font-size:12.5px}
  .agents{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .agent{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .agent .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .agent .nm{font-weight:600}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;color:#0a0d13;font-weight:700}
  .b-opus{background:var(--opus)} .b-sonnet{background:var(--sonnet)} .b-haiku{background:var(--haiku)} .b-na{background:var(--dim)}
  .agent .desc{color:var(--dim);font-size:11.5px}
  /* viewer */
  .viewer .filemeta{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer}
  .btn:hover{color:#fff;border-color:var(--accent)}
  pre.code{background:#0c1018;border:1px solid var(--line);border-radius:10px;padding:0;overflow:auto;margin:0}
  pre.code .ln{display:flex}
  pre.code .ln .no{color:#3c4860;text-align:right;padding:0 12px;user-select:none;min-width:48px;border-right:1px solid var(--line)}
  pre.code .ln .tx{padding:0 14px;white-space:pre}
  pre.code .ln.hl{background:rgba(92,200,255,.10)}
  table.tbl{border-collapse:collapse;width:100%;font-size:12px}
  table.tbl th,table.tbl td{border:1px solid var(--line);padding:5px 8px;text-align:left;vertical-align:top;max-width:320px;overflow:hidden;text-overflow:ellipsis}
  table.tbl th{background:var(--panel2);position:sticky;top:0;cursor:pointer}
  table.tbl tr:nth-child(even){background:#0e1320}
  .lvl-error{color:var(--bad)} .lvl-warn{color:var(--warn)} .lvl-info{color:var(--good)}
  /* markdown */
  .md h1{font-size:19px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .md h2{font-size:15.5px;margin-top:18px} .md h3{font-size:13.5px;color:var(--accent)}
  .md code{background:#0c1018;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12px}
  .md pre{background:#0c1018;border:1px solid var(--line);border-radius:9px;padding:11px;overflow:auto}
  .md pre code{border:0;padding:0;background:none}
  .md table{border-collapse:collapse;width:100%;font-size:12.5px;margin:8px 0}
  .md th,.md td{border:1px solid var(--line);padding:5px 8px;text-align:left;vertical-align:top}
  .md th{background:var(--panel2)}
  .md blockquote{border-left:3px solid var(--accent);margin:8px 0;padding:2px 12px;color:var(--dim);background:#0c101833}
  .md ul,.md ol{padding-left:22px} .md hr{border:0;border-top:1px solid var(--line);margin:14px 0}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#202a3d;border-radius:6px}
  /* legend / toggles / diff / alerts */
  .legend{display:flex;gap:16px;align-items:center;padding:6px 16px;font-size:11.5px;color:var(--dim);background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .legend b{color:var(--ink);font-weight:600}
  .legend kbd{background:var(--panel3);border:1px solid var(--line);border-radius:4px;padding:0 5px;font-family:ui-monospace,Consolas,monospace}
  .toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .toggle .sw{width:30px;height:16px;border-radius:20px;background:var(--panel3);position:relative;transition:.15s}
  .toggle .sw::after{content:"";position:absolute;width:12px;height:12px;border-radius:50%;background:var(--dim);top:2px;left:2px;transition:.15s}
  .toggle.on .sw{background:var(--accent)} .toggle.on .sw::after{left:16px;background:#06121c}
  .legend .err{margin-left:auto;color:var(--bad);cursor:pointer;display:none}
  .legend .err.show{display:inline}
  .banner{background:#3a2a10;border:1px solid #5a4420;color:var(--warn);border-radius:8px;padding:7px 11px;margin-bottom:12px;font-size:12.5px}
  .alert{background:#3a1420;border:1px solid #5a2330;color:#ff9aa6;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12.5px;cursor:pointer}
  .alert b{color:#fff}
  .changedbar{display:flex;gap:10px;align-items:center;background:#0f2236;border:1px solid #1d3a55;border-radius:8px;padding:7px 11px;margin-bottom:12px;font-size:12.5px;color:var(--accent)}
  .diffbox{background:#0c1018;border:1px solid var(--line);border-radius:8px;margin-top:6px;overflow:auto;max-height:260px}
  .dl{padding:1px 10px;white-space:pre;font-family:ui-monospace,Consolas,monospace;font-size:12px;color:var(--dim)}
  .dl.add{background:rgba(46,160,67,.13);color:#7ee787} .dl.add::before{content:"+ "}
  .dl.del{background:rgba(248,81,73,.12);color:#ffa198} .dl.del::before{content:"− "}
  .ev.exp{background:var(--panel2)}
  .sortarrow{color:var(--accent);font-size:10px}
  @media(max-width:860px){.main{grid-template-columns:1fr}.side{display:none}.grid{grid-template-columns:1fr 1fr}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="logo">◭ Live Dashboard</span>
    <span class="proj" id="projName">scanning…</span>
    <span class="badges" id="badges"></span>
    <span class="search">
      <input id="q" placeholder="/ search files & content…" autocomplete="off"/>
    </span>
    <span class="live"><span class="dot" id="dot"></span><span id="status">connecting…</span></span>
  </header>
  <div class="legend" id="legend">
    <span><span class="dot" style="display:inline-block;vertical-align:middle"></span> <b>live</b> · files flash on change</span>
    <span class="toggle on" id="followToggle"><span class="sw"></span> Follow latest change</span>
    <span>press <kbd>/</kbd> to search · <kbd>Enter</kbd> = content search · click anything</span>
    <span class="err" id="errChip" title="jump to recent errors">⚠ <span id="errCount">0</span> errors</span>
  </div>
  <div class="main">
    <aside class="side">
      <div class="sec">
        <h3>Files <span id="fileCount" class="mono" style="color:var(--dim)"></span></h3>
      </div>
      <div class="tree" id="tree"><div class="empty">crawling…</div></div>
      <div class="sec" style="border-top:1px solid var(--line)">
        <h3>Activity <span id="actCount" class="mono" style="color:var(--dim)"></span></h3>
      </div>
      <div class="feed" id="feed"><div class="empty" style="padding:6px 12px">no changes yet — edit a file</div></div>
    </aside>
    <section class="content" id="content"><div class="empty">loading…</div></section>
  </div>
</div>

<script>
"use strict";
const POLL_MS=2000, RECRAWL_EVERY=5, MAX_FILES=2000, MAX_TEXT=512*1024, BATCH=20;
const IGNORE_DIR=new Set(['node_modules','.git','.svn','.hg','dist','build','out','target',
  '.venv','venv','env','__pycache__','.next','.nuxt','.cache','coverage','.pytest_cache',
  '.idea','.gradle','.mvn','vendor','bower_components','.terraform','.parcel-cache','tmp']);
const TEXT_EXT=new Set(['md','markdown','txt','json','jsonl','ndjson','log','csv','tsv','yml','yaml','toml','ini','cfg','conf','env',
  'js','mjs','cjs','ts','tsx','jsx','py','rb','go','rs','java','kt','c','h','cpp','hpp','cc','cs','php','swift','sh','bash','zsh','ps1','psm1',
  'html','htm','css','scss','sass','less','vue','svelte','sql','xml','gradle','dockerfile','makefile','gitignore','example','rst']);
const ICON={dir:'▸',dirOpen:'▾',md:'📄',json:'🔧',jsonl:'🗂',log:'📜',csv:'📊',code:'⟨⟩',img:'🖼',txt:'📃',other:'•'};
const ERR_RE=/\b(error|errors|fail|failed|failure|fatal|exception|traceback|panic|✗|❌)\b/i;

let state={
  files:new Map(), tree:{root:null}, open:new Set(['']), current:null,
  activity:[], expanded:new Set(), pulse:new Array(60).fill(0),
  poll:0, hidden:0, projType:[], pkg:null, errored:false, follow:true,
  errors:[], errSeen:0, truncated:false, tableView:null, query:''
};

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const attr=s=>esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const now=()=>new Date().toTimeString().slice(0,8);
const ago=t=>{const s=(Date.now()-t)/1000;return s<60?Math.floor(s)+'s':s<3600?Math.floor(s/60)+'m':Math.floor(s/3600)+'h';};
const extOf=p=>{const n=p.split('/').pop().toLowerCase();if(n==='dockerfile')return'dockerfile';if(n==='makefile')return'makefile';const i=n.lastIndexOf('.');return i<0?'':n.slice(i+1);};
const base=p=>p.split('/').pop()||p;
const fmtSize=b=>b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
function typeOf(e){if(['md','markdown','rst'].includes(e))return'md';if(e==='json')return'json';
  if(['jsonl','ndjson'].includes(e))return'jsonl';if(e==='log')return'log';if(['csv','tsv'].includes(e))return'csv';
  if(['png','jpg','jpeg','gif','svg','webp','ico','bmp'].includes(e))return'img';
  if(TEXT_EXT.has(e))return'code';return e?'other':'txt';}
const isTextFile=f=>TEXT_EXT.has(f.ext);   // whitelist only — never fetch binaries as text

/* ---------- crawl: auto-discover any project ---------- */
async function listDir(path){
  const r=await fetch(path+'?_='+Date.now(),{cache:'no-store'});
  if(!r.ok) return null;                 // null => no listing available
  const html=await r.text();
  if(!/href=/.test(html)) return [];
  const out=[]; const re=/href="([^"]+)"/g; let m;
  while(m=re.exec(html)){
    let href=m[1];
    if(/^(https?:|mailto:|#|\?|javascript:)/i.test(href)) continue;
    if(href==='../'||href==='..'||href==='./'||href==='.') continue;
    const isDir=href.endsWith('/');
    let cp;
    if(href.startsWith('/')) cp=decodeURIComponent(href).replace(/\/$/,'');           // absolute (npx serve)
    else cp=(path==='/'?'':path)+'/'+decodeURIComponent(href).replace(/\/$/,'');      // relative (python)
    if(!cp||cp===path) continue;
    if(path.startsWith(cp+'/')||cp===path.replace(/\/$/,'')) continue;                // skip self/ancestor
    const nm=base(cp); if(!nm||nm==='.'||nm==='..') continue;
    out.push({name:nm,isDir,path:cp});
  }
  return out;
}
async function crawl(path,depth,seen,visited){
  if(depth>7||visited.has(path)) return; visited.add(path);
  const items=await listDir(path); if(!items) return;
  for(const it of items){
    if(it.isDir){ if(IGNORE_DIR.has(it.name)||it.name==='.git') continue; await crawl(it.path,depth+1,seen,visited); }
    else{
      seen.add(it.path);
      if(!state.files.has(it.path)){
        if(state.files.size>=MAX_FILES){ state.truncated=true; continue; }
        const ext=extOf(it.path);
        state.files.set(it.path,{lastmod:null,prevmod:null,text:null,size:0,type:typeOf(ext),ext,lines:0,changed:0,seenOnce:false,lastDiff:null});
      }
    }
  }
}
function pruneDeleted(seen){
  let removed=[];
  for(const p of [...state.files.keys()]) if(!seen.has(p)){ state.files.delete(p); removed.push(p); }
  return removed;
}
function buildTree(){
  const root={name:'',path:'',dir:true,children:{}};
  for(const p of [...state.files.keys()].sort()){
    const parts=p.replace(/^\//,'').split('/'); let cur=root;
    parts.forEach((part,i)=>{const isFile=i===parts.length-1;const fp='/'+parts.slice(0,i+1).join('/');
      if(!cur.children[part])cur.children[part]={name:part,path:fp,dir:!isFile,children:{}};cur=cur.children[part];});
  }
  state.tree.root=root;
}

/* ---------- change detection (conditional GET + content compare) ---------- */
async function refreshFile(p){
  const f=state.files.get(p); if(!f) return '';
  const hdr={}; if(f.lastmod) hdr['If-Modified-Since']=f.lastmod;
  let r; try{ r=await fetch(p+'?_='+Date.now(),{cache:'no-store',headers:hdr}); }catch(e){ return ''; }
  if(r.status===304) return '';
  if(r.status===404) return 'deleted';
  if(!r.ok) return '';
  const lm=r.headers.get('Last-Modified'), len=+(r.headers.get('Content-Length')||0);
  f.prevmod=f.lastmod; f.lastmod=lm||f.lastmod||null;
  const first=!f.seenOnce; let changed=false;
  if(isTextFile(f) && len<=MAX_TEXT){
    let txt; try{ txt=await r.text(); }catch(e){ txt=null; }
    if(txt!=null){
      f.size=len||txt.length;
      if(f.text!=null && f.text!==txt){            // real content change — never phantom
        const d=diff(f.text,txt); f.lastDiff=d; changed=true;
        scanErrors(p,f,d.addLines);
      }
      f.text=txt; f.lines=txt.split('\n').length;
    }
  }else{
    f.size=len;
    // binary/oversize: only trust an actual Last-Modified change (no validator => no phantom)
    if(!first && lm && f.prevmod && lm!==f.prevmod) changed=true;
  }
  f.seenOnce=true;
  if(changed && !first){
    f.changed=Date.now();
    const d=f.lastDiff||{add:0,del:0};
    state.activity.unshift({tms:Date.now(),path:p,add:d.add||0,del:d.del||0});
    if(state.activity.length>150) state.activity.pop();
    state.pulse[state.pulse.length-1]++;
    if(document.hidden){state.hidden++;document.title='('+state.hidden+') Live Dashboard';}
    return 'changed';
  }
  return '';
}
function diff(a,b){
  const A=a.split('\n'),B=b.split('\n'),m=new Map();
  A.forEach(l=>m.set(l,(m.get(l)||0)-1)); B.forEach(l=>m.set(l,(m.get(l)||0)+1));
  const sa=new Map(m),sd=new Map(m),addLines=[],delLines=[];
  for(const l of B){if((sa.get(l)||0)>0){addLines.push(l);sa.set(l,sa.get(l)-1);}}
  for(const l of A){if((sd.get(l)||0)<0){delLines.push(l);sd.set(l,sd.get(l)+1);}}
  return {add:addLines.length,del:delLines.length,addLines:addLines.slice(0,60),delLines:delLines.slice(0,60)};
}
function scanErrors(p,f,addLines){
  if(!['log','jsonl','json'].includes(f.type) && !/(^|\/)(runs|logs)\//.test(p)) return;
  (addLines||[]).forEach(l=>{ if(ERR_RE.test(l) && !/0 error|no error|errors":0|errors: 0/i.test(l)){
    state.errors.unshift({tms:Date.now(),path:p,text:l.trim().slice(0,160)});
  }});
  if(state.errors.length>60) state.errors.length=60;
}

/* ---------- project detection ---------- */
function detectProject(){
  const names=new Set([...state.files.keys()].map(p=>base(p).toLowerCase())); const has=n=>names.has(n); const t=[];
  if(has('package.json'))t.push('Node / JS'); if(has('tsconfig.json'))t.push('TypeScript');
  if(has('pyproject.toml')||has('requirements.txt')||has('setup.py')||has('pipfile'))t.push('Python');
  if(has('cargo.toml'))t.push('Rust'); if(has('go.mod'))t.push('Go');
  if(has('pom.xml')||has('build.gradle')||has('build.gradle.kts'))t.push('Java/JVM');
  if(has('gemfile'))t.push('Ruby'); if(has('composer.json'))t.push('PHP');
  if([...names].some(n=>n.endsWith('.csproj')||n.endsWith('.sln')))t.push('.NET');
  if(has('cmakelists.txt'))t.push('C/C++'); if(has('dockerfile'))t.push('Docker'); if(has('makefile'))t.push('Make');
  if([...state.files.keys()].some(p=>p.includes('/.claude/agents/')))t.push('⛭ Agent team');
  state.projType=[...new Set(t)];
  const pk=[...state.files.keys()].find(p=>base(p)==='package.json');
  if(pk&&state.files.get(pk).text){try{state.pkg=JSON.parse(state.files.get(pk).text);}catch(e){state.pkg=null;}}
}

/* ---------- markdown (XSS-safe) ---------- */
function safeURL(u){u=u.trim();return /^(javascript:|data:|vbscript:)/i.test(u)?'#':u;}
function inline(s){return esc(s)
  .replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
  .replace(/(^|[^*])\*([^*\s][^*]*)\*/g,'$1<i>$2</i>')
  .replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,t,u)=>'<a href="'+attr(safeURL(u))+'" target="_blank" rel="noopener">'+t+'</a>');}
function md(src){const L=src.replace(/\r/g,'').split('\n');let o=[],i=0;
  while(i<L.length){let l=L[i];
    if(/^```/.test(l)){let b=[];i++;while(i<L.length&&!/^```/.test(L[i])){b.push(esc(L[i]));i++}i++;o.push('<pre><code>'+b.join('\n')+'</code></pre>');continue;}
    if(/^\s*\|.*\|\s*$/.test(l)&&i+1<L.length&&/^\s*\|[\s:|-]+\|\s*$/.test(L[i+1])){
      const row=s=>s.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      let h=row(l);i+=2;let bd=[];while(i<L.length&&/^\s*\|.*\|\s*$/.test(L[i])){bd.push(row(L[i]));i++}
      o.push('<table><thead><tr>'+h.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'+bd.map(r=>'<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>');continue;}
    let m;if(m=l.match(/^(#{1,6})\s+(.*)/)){o.push('<h'+m[1].length+'>'+inline(m[2])+'</h'+m[1].length+'>');i++;continue;}
    if(/^\s*>/.test(l)){let b=[];while(i<L.length&&/^\s*>/.test(L[i])){b.push(L[i].replace(/^\s*>\s?/,''));i++}o.push('<blockquote>'+md(b.join('\n'))+'</blockquote>');continue;}
    if(/^\s*[-*]\s+/.test(l)){let b=[];while(i<L.length&&/^\s*[-*]\s+/.test(L[i])){b.push('<li>'+inline(L[i].replace(/^\s*[-*]\s+/,''))+'</li>');i++}o.push('<ul>'+b.join('')+'</ul>');continue;}
    if(/^\s*\d+\.\s+/.test(l)){let b=[];while(i<L.length&&/^\s*\d+\.\s+/.test(L[i])){b.push('<li>'+inline(L[i].replace(/^\s*\d+\.\s+/,''))+'</li>');i++}o.push('<ol>'+b.join('')+'</ol>');continue;}
    if(/^\s*---\s*$/.test(l)){o.push('<hr>');i++;continue;}
    if(/^<!--/.test(l)){i++;continue;} if(l.trim()===''){i++;continue;}
    o.push('<p>'+inline(l)+'</p>');i++;}
  return o.join('\n');}
function frontmatter(t){const m=t.match(/^---\n([\s\S]*?)\n---/);const fm={};if(m)m[1].split('\n').forEach(l=>{const x=l.match(/^([a-zA-Z_]+):\s*(.*)$/);if(x)fm[x[1]]=x[2].replace(/^["']|["']$/g,'');});return fm;}

/* ---------- tree ---------- */
function iconFile(type){return ICON[type]||ICON.other;}
function renderTree(){
  const root=state.tree.root; const wrap=$('#tree'); if(!root){return;} wrap.innerHTML='';
  const q=state.query.toLowerCase();
  (function walk(node,c){
    const kids=Object.values(node.children).sort((a,b)=>(b.dir-a.dir)||a.name.localeCompare(b.name));
    for(const k of kids){
      if(k.dir){
        if(q&&!subMatch(k,q))continue;
        const n=el('div','node dir'+(state.current===k.path?' active':''));
        n.innerHTML='<span class="ic">'+(state.open.has(k.path)||q?ICON.dirOpen:ICON.dir)+'</span><span class="nm">'+esc(k.name)+'</span>';
        n.onclick=()=>{state.open.has(k.path)?state.open.delete(k.path):state.open.add(k.path);renderTree();};
        c.appendChild(n);
        if(state.open.has(k.path)||q){const kc=el('div','kids');walk(k,kc);c.appendChild(kc);}
      }else{
        if(q&&!k.path.toLowerCase().includes(q))continue;
        const f=state.files.get(k.path); const recent=f&&f.changed&&(Date.now()-f.changed<8000);
        const n=el('div','node'+(state.current===k.path?' active':''));
        n.innerHTML='<span class="ic">'+iconFile(f?f.type:'other')+'</span><span class="nm">'+esc(k.name)+'</span>'+(recent?'<span class="chg"></span>':'');
        n.onclick=()=>openFile(k.path); c.appendChild(n);
      }
    }
  })(root,wrap);
  if(!wrap.children.length)wrap.innerHTML='<div class="empty" style="padding:6px 10px">'+(q?'no matches':'no files')+'</div>';
  $('#fileCount').textContent=state.files.size+(state.truncated?'+ (capped)':'');
}
function subMatch(n,q){return Object.values(n.children).some(c=>c.dir?subMatch(c,q):c.path.toLowerCase().includes(q));}

/* ---------- activity feed (expandable inline diff) ---------- */
function renderFeed(){
  const f=$('#feed'); $('#actCount').textContent=state.activity.length||'';
  if(!state.activity.length){f.innerHTML='<div class="empty" style="padding:6px 12px">no changes yet — edit a file</div>';return;}
  f.innerHTML='';
  state.activity.slice(0,100).forEach((a,idx)=>{
    const exp=state.expanded.has(a.tms+a.path);
    const fl=state.files.get(a.path);
    const e=el('div','ev'+(exp?' exp':''));
    e.innerHTML='<div class="row1"><span class="t">'+ago(a.tms)+' ago</span><span class="nm">'+esc(base(a.path))+'</span>'+
      '<span class="d">'+(a.add?'<span class="add">+'+a.add+'</span> ':'')+(a.del?'<span class="del">−'+a.del+'</span>':'')+'</span></div>'+
      '<div style="color:var(--dim);font-size:11px;overflow:hidden;text-overflow:ellipsis">'+esc(a.path)+'</div>';
    const head=e.firstChild;
    head.style.cursor='pointer';
    head.onclick=()=>{const k=a.tms+a.path; state.expanded.has(k)?state.expanded.delete(k):state.expanded.add(k); renderFeed();};
    if(exp){
      const d=fl&&fl.lastDiff;
      const box=el('div','diffbox');
      if(d&&(d.delLines.length||d.addLines.length)){
        box.innerHTML=d.delLines.map(l=>'<div class="dl del">'+esc(l||' ')+'</div>').join('')+d.addLines.map(l=>'<div class="dl add">'+esc(l||' ')+'</div>').join('');
      }else box.innerHTML='<div class="dl">(no line-level diff captured)</div>';
      e.appendChild(box);
      const open=el('div',null,'<span class="btn" style="margin-top:6px;display:inline-block">open file ↗</span>');
      open.onclick=()=>openFile(a.path); e.appendChild(open);
    }
    f.appendChild(e);
  });
}

/* ---------- overview ---------- */
function renderOverview(){
  state.current='OVERVIEW'; const c=$('#content'); const files=[...state.files.values()];
  const totalSize=files.reduce((s,f)=>s+(f.size||0),0);
  const typeCount={}; files.forEach(f=>typeCount[f.type]=(typeCount[f.type]||0)+1);
  const hot={}; state.activity.forEach(a=>hot[a.path]=(hot[a.path]||0)+1);
  const hotspots=Object.entries(hot).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const todos=scanTodos().slice(0,40);
  const logs=[...state.files.entries()].filter(([p,f])=>['jsonl','log','csv'].includes(f.type)||/(^|\/)(runs|logs)\//.test(p));
  const agentFiles=[...state.files.entries()].filter(([p])=>/\/\.claude\/agents\/[^/]+\.md$/.test(p));

  let h='<div class="crumbs"><span>Overview</span></div>';
  if(state.truncated) h+='<div class="banner">Showing the first '+MAX_FILES+' files (project is larger). Heaviest dirs are auto-ignored; raise MAX_FILES to see more.</div>';
  if(state.errors.length) h+='<div class="alert" onclick="showErrors()"><b>⚠ '+state.errors.length+' recent error line'+(state.errors.length>1?'s':'')+'</b> detected in logs — click to view. Latest: '+esc(state.errors[0].text.slice(0,80))+'</div>';
  h+='<div class="grid">'+stat('Files',state.files.size)+stat('Total size',fmtSize(totalSize))+stat('Changes this session',state.activity.length)+stat('Errors seen',state.errors.length)+'</div>';

  // live agent-activity stream (heartbeat convention) — appears when runs/activity.jsonl exists
  const af=[...state.files.entries()].find(([p])=>/(^|\/)activity\.jsonl$/.test(p));
  if(af){
    const PH=['plan','build','research','qa','review','ship','error','heartbeat'];
    const ents=(af[1].text||'').split('\n').map(l=>{try{return JSON.parse(l);}catch(e){return null;}}).filter(Boolean).reverse().slice(0,16);
    h+='<div class="card"><h2>⚡ Agent activity <span class="count">live · '+ents.length+'</span></h2><div class="body"><div class="list">'+
      (ents.length?ents.map(e=>{const pc=PH.includes(e.phase)?e.phase:'heartbeat';   // whitelist → safe attribute value
        return '<div class="li"><span class="pill ph-'+pc+'">'+esc(e.phase||'·')+'</span> '+esc(e.msg||'')+'<span class="meta">'+esc(e.agent||'')+(e.ts?' · '+esc(String(e.ts).slice(11,19)):'')+'</span></div>';}).join(''):'<span class="empty">waiting for agent heartbeats…</span>')+
      '</div></div></div>';
  }

  h+='<div class="cards"><div>';
  h+='<div class="card"><h2>Project</h2><div class="body">';
  h+='<div style="margin-bottom:8px">'+(state.projType.length?state.projType.map(t=>'<span class="tag">'+esc(t)+'</span>').join(' '):'<span class="empty">type not detected — generic project</span>')+'</div>';
  if(state.pkg){
    h+='<div style="font-size:13px"><b>'+esc(state.pkg.name||'')+'</b> '+esc(state.pkg.version?('v'+state.pkg.version):'')+'</div>';
    if(state.pkg.description)h+='<div class="empty" style="margin:3px 0 8px">'+esc(state.pkg.description)+'</div>';
    if(state.pkg.scripts)h+='<div style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:6px 0 4px">npm scripts</div>'+
      Object.entries(state.pkg.scripts).slice(0,8).map(([k,v])=>'<div style="font-size:12px"><code>'+esc(k)+'</code> <span class="empty mono">'+esc(String(v).slice(0,64))+'</span></div>').join('');
  } else h+='<div class="empty" style="font-size:12px">No package.json. This view works on any folder — the tree, search, diffs, logs and file viewers all light up as files change.</div>';
  h+='</div></div>';
  const maxT=Math.max(...Object.values(typeCount),1);
  h+='<div class="card"><h2>File types</h2><div class="body"><div class="bars">'+
    Object.entries(typeCount).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k,v])=>'<div class="bar"><span>'+esc(k)+'</span><span class="track"><span class="fill" style="width:'+(v/maxT*100)+'%"></span></span><span style="text-align:right;color:var(--dim)">'+v+'</span></div>').join('')+'</div></div></div>';
  h+='</div><div>';
  const maxP=Math.max(...state.pulse,1);
  h+='<div class="card"><h2>Session pulse <span class="count">~2 min</span></h2><div class="body"><div class="pulse">'+state.pulse.map(v=>'<span class="b'+(v>0?' hot':'')+'" style="height:'+(v?Math.max(8,v/maxP*38):2)+'px" title="'+v+' changes"></span>').join('')+'</div></div></div>';
  h+='<div class="card"><h2>Hotspots <span class="count">most-changed</span></h2><div class="body"><div class="list">'+(hotspots.length?hotspots.map(([p,n])=>'<div class="li" data-open="'+attr(p)+'">'+esc(base(p))+'<span class="meta">'+n+' edits</span></div>').join(''):'<span class="empty">no edits yet — change a file to see it here</span>')+'</div></div></div>';
  h+='</div></div>';

  if(agentFiles.length){
    h+='<div class="card"><h2>⛭ Agent team</h2><div class="body"><div class="agents">'+agentFiles.map(([p,f])=>{const fm=frontmatter(f.text||'');const mdl=(fm.model||'na').toLowerCase();
      return '<div class="agent"><div class="top"><span class="nm">'+esc(fm.name||base(p))+'</span><span class="badge b-'+(['opus','sonnet','haiku'].includes(mdl)?mdl:'na')+'">'+esc(mdl)+'</span></div><div class="desc">'+esc((fm.description||'').slice(0,150))+'</div></div>';}).join('')+'</div></div></div>';
  }
  h+='<div class="card"><h2>Logs & data <span class="count">'+logs.length+'</span></h2><div class="body"><div class="list">'+(logs.length?logs.map(([p,f])=>'<div class="li" data-open="'+attr(p)+'"><span class="pill">'+f.type+'</span> '+esc(p)+'<span class="meta">'+(f.lines||0)+' lines · '+fmtSize(f.size)+'</span></div>').join(''):'<span class="empty">no log/data files yet</span>')+'</div></div></div>';
  h+='<div class="card"><h2>TODO / FIXME <span class="count">'+todos.length+'</span></h2><div class="body"><div class="list">'+(todos.length?todos.map(t=>'<div class="li" data-open="'+attr(t.path)+'" data-line="'+t.line+'"><span class="pill '+t.kind.toLowerCase()+'">'+t.kind+'</span> '+esc(t.text.slice(0,90))+'<span class="meta">'+esc(base(t.path))+':'+t.line+'</span></div>').join(''):'<span class="empty">none found 🎉</span>')+'</div></div></div>';

  c.innerHTML=h; c.scrollTop=0;
  c.querySelectorAll('[data-open]').forEach(n=>n.onclick=()=>openFile(n.dataset.open,n.dataset.line?+n.dataset.line:null));
}
function stat(k,v){return '<div class="stat"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';}
function scanTodos(){const out=[];const re=/\b(TODO|FIXME|HACK|XXX|BUG)\b[:\s-]*(.*)/;
  for(const[p,f]of state.files){if(!f.text||f.type==='md'&&/todo/i.test(base(p)))continue;
    const lines=f.text.split('\n');for(let i=0;i<lines.length;i++){const m=lines[i].match(re);if(m)out.push({path:p,line:i+1,kind:m[1],text:m[2]||m[0]});if(out.length>200)break;}
    if(out.length>200)break;}return out;}
window.showErrors=()=>{
  const c=$('#content'); state.current=null; state.errSeen=state.errors.length; updateErrChip();
  c.innerHTML='<div class="crumbs"><span class="btn" onclick="goOverview()">Overview</span> <span>›</span> Recent errors</div>'+
    '<div class="card"><h2>Recent error / failure lines <span class="count">'+state.errors.length+'</span></h2><div class="body"><div class="list">'+
    (state.errors.length?state.errors.map(e=>'<div class="li" data-open="'+attr(e.path)+'"><span class="pill fixme">'+ago(e.tms)+' ago</span> <span class="mono" style="color:#ff9aa6">'+esc(e.text)+'</span><span class="meta">'+esc(base(e.path))+'</span></div>').join(''):'<span class="empty">none</span>')+
    '</div></div></div>';
  c.querySelectorAll('[data-open]').forEach(n=>n.onclick=()=>openFile(n.dataset.open));
};

/* ---------- file viewer ---------- */
function openFile(p,gotoLine){
  const f=state.files.get(p); if(!f){return;} state.current=p; state.tableView=null; renderTree();
  const c=$('#content'); const parts=p.replace(/^\//,'').split('/');
  let h='<div class="crumbs"><span class="btn" onclick="goOverview()">Overview</span>'+parts.map(x=>' <span>›</span> '+esc(x)).join('')+'</div>';
  h+='<div class="filemeta"><span class="tag">'+f.type+'</span><span class="empty mono">'+esc(p)+'</span><span class="empty">'+(f.lines||0)+' lines · '+fmtSize(f.size)+'</span>'+
    '<button class="btn" onclick="copyPath(\''+attr(p)+'\')">copy path</button><a class="btn" href="'+attr(p)+'" target="_blank" rel="noopener">raw ↗</a></div>';
  if(f.changed&&Date.now()-f.changed<60000&&f.lastDiff&&(f.lastDiff.add||f.lastDiff.del))
    h+='<div class="changedbar">✦ changed '+ago(f.changed)+' ago: <span class="add">+'+f.lastDiff.add+'</span> <span class="del">−'+f.lastDiff.del+'</span> <span class="btn" onclick="toggleDiff()" id="diffBtn">show diff</span></div><div id="diffHolder"></div>';
  let body;
  if(f.text===null && !isTextFile(f)) body='<div class="empty">binary / non-text file — <a href="'+attr(p)+'" target="_blank" rel="noopener">open raw ↗</a></div>';
  else if(f.text===null) body='<div class="empty">loading…</div>';
  else if(f.type==='md') body='<div class="md">'+md(f.text)+'</div>';
  else if(f.type==='jsonl') body=renderTable(parseJSONL(f.text),'jsonl');
  else if(f.type==='csv') body=renderTable(parseCSV(f.text,f.ext==='tsv'?'\t':','),'csv');
  else if(f.type==='log') body=renderLog(f.text);
  else if(f.type==='json') body=renderCode(prettyJSON(f.text),gotoLine);
  else body=renderCode(f.text,gotoLine);
  c.innerHTML=h+'<div class="viewer">'+body+'</div>'; c.scrollTop=0;
  if(gotoLine){const ln=c.querySelector('.ln.hl');if(ln)ln.scrollIntoView({block:'center'});}
}
window.toggleDiff=()=>{const f=state.files.get(state.current);if(!f||!f.lastDiff)return;const hold=$('#diffHolder'),btn=$('#diffBtn');
  if(hold.innerHTML){hold.innerHTML='';btn.textContent='show diff';return;}
  const d=f.lastDiff;hold.innerHTML='<div class="diffbox">'+d.delLines.map(l=>'<div class="dl del">'+esc(l||' ')+'</div>').join('')+d.addLines.map(l=>'<div class="dl add">'+esc(l||' ')+'</div>').join('')+'</div>';btn.textContent='hide diff';};
window.goOverview=()=>{renderOverview();renderTree();};
window.copyPath=p=>{try{navigator.clipboard.writeText(p);}catch(e){}};

function prettyJSON(t){try{return JSON.stringify(JSON.parse(t),null,2);}catch(e){return t;}}
function renderCode(t,hl){const lines=t.split('\n');
  return '<pre class="code mono">'+lines.map((l,i)=>'<div class="ln'+(hl===i+1?' hl':'')+'"><span class="no">'+(i+1)+'</span><span class="tx">'+(esc(l)||' ')+'</span></div>').join('')+'</pre>';}
function parseJSONL(t){const rows=t.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{try{return JSON.parse(l);}catch(e){return{_raw:l};}});
  const cols=[];rows.forEach(r=>Object.keys(r).forEach(k=>{if(!cols.includes(k))cols.push(k);}));
  const tk=['ts','timestamp','time','date','created','at'].find(k=>cols.includes(k));
  if(tk)rows.sort((a,b)=>String(b[tk]||'').localeCompare(String(a[tk]||'')));
  return {rows,cols:cols.slice(0,10)};}
function parseCSV(t,sep){const lines=t.split(/\r?\n/).filter(l=>l.length);const rows=lines.map(line=>{
  const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];
    if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;else if(ch===sep){out.push(cur);cur='';}else cur+=ch;}}
  out.push(cur);return out;});
  const head=rows[0]||[];const objs=rows.slice(1).map(r=>{const o={};head.forEach((h,i)=>o[h]=r[i]);return o;});
  return {rows:objs,cols:head.slice(0,12)};}
function renderTable(data,kind){
  if(!data.rows.length)return '<div class="empty">empty</div>';
  state.tableView={kind,rows:data.rows.slice(),cols:data.cols,sortCol:null,dir:1};
  return '<div id="tblWrap" style="overflow:auto;max-height:72vh">'+tableHTML()+'</div>';
}
function tableHTML(){const tv=state.tableView;if(!tv)return'';
  return '<table class="tbl"><thead><tr>'+tv.cols.map((c,i)=>'<th onclick="sortCol('+i+')">'+esc(c)+(tv.sortCol===i?' <span class="sortarrow">'+(tv.dir>0?'▲':'▼')+'</span>':'')+'</th>').join('')+'</tr></thead><tbody>'+
    tv.rows.slice(0,800).map(r=>'<tr>'+tv.cols.map(c=>{let v=r[c];v=v==null?'':typeof v==='object'?JSON.stringify(v):String(v);return '<td title="'+attr(v)+'">'+esc(v.slice(0,160))+'</td>';}).join('')+'</tr>').join('')+'</tbody></table>';}
window.sortCol=i=>{const tv=state.tableView;if(!tv)return;const c=tv.cols[i];tv.dir=tv.sortCol===i?-tv.dir:1;tv.sortCol=i;
  tv.rows.sort((a,b)=>{let x=a[c],y=b[c];const nx=parseFloat(x),ny=parseFloat(y);
    if(!isNaN(nx)&&!isNaN(ny)){return(nx-ny)*tv.dir;}return String(x==null?'':x).localeCompare(String(y==null?'':y))*tv.dir;});
  $('#tblWrap').innerHTML=tableHTML();};
function renderLog(t){const lines=t.split('\n').filter(Boolean).slice(-1000).reverse();
  return '<pre class="code mono">'+lines.map(l=>{let cls='';if(/error|fail|fatal|exception|panic/i.test(l))cls='lvl-error';else if(/warn/i.test(l))cls='lvl-warn';else if(/info|ok|success|pass|done/i.test(l))cls='lvl-info';
    return '<div class="ln"><span class="tx '+cls+'">'+(esc(l)||' ')+'</span></div>';}).join('')+'</pre>';}

/* ---------- search ---------- */
$('#q').addEventListener('input',e=>{state.query=e.target.value.trim();renderTree();});
$('#q').addEventListener('keydown',e=>{if(e.key==='Enter'&&state.query.length>=2)contentSearch(state.query);if(e.key==='Escape'){state.query='';e.target.value='';renderTree();}});
document.addEventListener('keydown',e=>{if(e.key==='/'&&document.activeElement!==$('#q')){e.preventDefault();$('#q').focus();}});
function contentSearch(q){const ql=q.toLowerCase();const hits=[];
  for(const[p,f]of state.files){if(!f.text)continue;const lines=f.text.split('\n');
    for(let i=0;i<lines.length;i++)if(lines[i].toLowerCase().includes(ql)){hits.push({path:p,line:i+1,text:lines[i].trim()});if(hits.length>400)break;}
    if(hits.length>400)break;}
  const c=$('#content');state.current=null;
  c.innerHTML='<div class="crumbs"><span class="btn" onclick="goOverview()">Overview</span> <span>›</span> search "'+esc(q)+'"</div>'+
    '<div class="card"><h2>Content matches <span class="count">'+hits.length+'</span></h2><div class="body"><div class="list">'+
    (hits.length?hits.map(hh=>'<div class="li" data-open="'+attr(hh.path)+'" data-line="'+hh.line+'"><span class="mono" style="color:var(--accent)">'+esc(base(hh.path))+':'+hh.line+'</span> <span class="empty mono">'+esc(hh.text.slice(0,110))+'</span></div>').join(''):'<span class="empty">no matches in '+state.files.size+' files</span>')+
    '</div></div></div>';
  c.querySelectorAll('[data-open]').forEach(n=>n.onclick=()=>openFile(n.dataset.open,+n.dataset.line));}

/* ---------- chrome ---------- */
$('#followToggle').onclick=function(){state.follow=!state.follow;this.classList.toggle('on',state.follow);};
$('#errChip').onclick=()=>showErrors();
function updateErrChip(){const chip=$('#errChip'),n=state.errors.length;$('#errCount').textContent=n;chip.classList.toggle('show',n>0);
  if(n>state.errSeen){chip.style.fontWeight='700';}else chip.style.fontWeight='400';}
function renderBadges(){$('#badges').innerHTML=state.projType.map(t=>'<span class="tag">'+esc(t)+'</span>').join('');
  $('#projName').textContent=(state.pkg&&state.pkg.name)?state.pkg.name:('served @ '+location.host);}
function setStatus(ok){const d=$('#dot'),s=$('#status');if(ok){d.classList.remove('bad');s.textContent=state.files.size+' files · '+now();}else{d.classList.add('bad');s.textContent='server unreachable';}}
document.addEventListener('visibilitychange',()=>{if(!document.hidden){state.hidden=0;document.title='Live Dashboard';}});

/* ---------- poll loop (no overlap: chained, single in-flight) ---------- */
async function tick(){
  state.poll++; let ok=true;
  if(state.poll===1||state.poll%RECRAWL_EVERY===0){
    const seen=new Set(),before=state.files.size;
    try{await crawl('/',0,seen,new Set());}catch(e){ok=false;}
    let removed=[];if(seen.size||state.poll>1)removed=pruneDeleted(seen);
    if(removed.includes(state.current))goOverview();
    if(state.files.size!==before||removed.length){buildTree();detectProject();renderBadges();renderTree();if(state.current==='OVERVIEW')renderOverview();}
  }
  const paths=[...state.files.keys()];const changed=[];const deleted=[];
  for(let i=0;i<paths.length;i+=BATCH){
    const batch=paths.slice(i,i+BATCH);
    const res=await Promise.all(batch.map(p=>refreshFile(p).catch(()=>'')));
    res.forEach((r,j)=>{if(r==='changed')changed.push(batch[j]);else if(r==='deleted')deleted.push(batch[j]);});
  }
  if(deleted.length){deleted.forEach(p=>state.files.delete(p));buildTree();if(deleted.includes(state.current))goOverview();renderTree();}
  state.pulse.push(0);if(state.pulse.length>60)state.pulse.shift();
  if(state.poll<=2){detectProject();renderBadges();buildTree();renderTree();if(!state.current||state.current==='OVERVIEW')renderOverview();}
  if(changed.length){
    updateErrChip(); renderFeed(); renderTree();
    if(state.current==='OVERVIEW')renderOverview();
    if(state.follow){ openFile(changed[changed.length-1]); flash($('#content')); }
    else if(state.current&&changed.includes(state.current)){ openFile(state.current); flash($('#content')); }
  }
  setStatus(ok);
}
function flash(n){if(!n)return;n.classList.remove('flash');void n.offsetWidth;n.classList.add('flash');}

(async function start(){
  $('#followToggle').classList.toggle('on',state.follow);
  try{await crawl('/',0,new Set(),new Set());}catch(e){}
  buildTree();detectProject();renderBadges();renderTree();renderOverview();
  await tick();
  (function loop(){setTimeout(async()=>{try{await tick();}catch(e){setStatus(false);}loop();},POLL_MS);})();
})();
</script>
